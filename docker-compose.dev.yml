services:

  db:
    image: mysql:8.0
    container_name: almoxpert_db_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE:      almoxpert
      MYSQL_USER:          almoxpert
      MYSQL_PASSWORD:      almoxpert
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  api:
    image: node:20-alpine
    container_name: almoxpert_api_dev
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:       development
      PORT:           3000
      DB_HOST:        db
      DB_PORT:        3306
      DB_NAME:        almoxpert
      DB_USER:        almoxpert
      DB_PASSWORD:    almoxpert
      JWT_SECRET:     dev-secret-not-for-production
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
  
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:3000

volumes:
  db_data_dev:
