services:

  # ── MySQL ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: almoxpert_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${DB_NAME:-almoxpert}
      MYSQL_USER:          ${DB_USER:-almoxpert}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-almoxpert}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # auto-runs on first boot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: almoxpert_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          3000
      DB_HOST:       db
      DB_PORT:       3306
      DB_NAME:       ${DB_NAME:-almoxpert}
      DB_USER:       ${DB_USER:-almoxpert}
      DB_PASSWORD:   ${DB_PASSWORD:-almoxpert}
      JWT_SECRET:    ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Web ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:3000

volumes:
  db_data:
